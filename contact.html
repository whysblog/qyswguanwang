<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们 | 清研思维</title>
  <meta name="description" content="联系清研思维，预约课程咨询与试听体验。" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/">
        <img src="logo.png" alt="清研思维 logo" />
        <div><strong>清研思维</strong><span>教育思维扩展</span></div>
      </a>
      <button class="menu-btn" data-menu-toggle aria-expanded="false" aria-label="打开菜单">菜单</button>
      <nav class="main-nav" aria-label="主导航">
        <a data-nav="home" href="/">首页</a>
        <a data-nav="about" href="/about">关于我们</a>
        <a data-nav="courses" href="/courses">课程体系</a>
        <a data-nav="methodology" href="/methodology">教学方法</a>
        <a data-nav="team" href="/team">师资团队</a>
        <a data-nav="contact" href="/contact">联系我们</a>
                <a data-nav="admin" href="/admin">后台登录</a>
        <a class="nav-cta" href="/contact#form">预约咨询</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-hero reveal">
      <span class="badge">Contact</span>
      <h1>欢迎联系清研思维</h1>
      <p>无论是课程咨询、试听预约还是合作交流，我们都会尽快回复。</p>
    </section>

    <section class="section reveal" id="form">
      <div class="contact-layout">
        <article class="form-card">
          <h2>预约咨询</h2>
          <p class="lead">填写基础信息后，我们将安排课程顾问与您联系。</p>
          <form id="contact-form" novalidate>
            <div class="form-row">
              <label for="name">家长姓名</label>
              <input id="name" name="name" placeholder="请输入姓名" />
            </div>
            <div class="form-row">
              <label for="phone">联系电话</label>
              <input id="phone" name="phone" placeholder="请输入手机号" />
            </div>
            <div class="form-row">
              <label for="studentAge">学生年龄段</label>
              <select id="studentAge" name="studentAge">
                <option value="">请选择</option>
                <option value="6-9">6-9 岁</option>
                <option value="10-14">10-14 岁</option>
                <option value="15-18">15-18 岁</option>
              </select>
            </div>
            <div class="form-row">
              <label for="message">咨询内容</label>
              <textarea id="message" name="message" placeholder="例如：想了解AI英语课程和试听安排"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">提交预约</button>
            <p class="form-status" role="status" aria-live="polite"></p>
          </form>
        </article>

        <aside class="contact-card">
          <h2>联系方式</h2>
          <p>咨询电话：18266631133（杨老师）</p>
          <p>服务时间：周二至周日 09:30 - 20:00</p>
          <p>地址：山东省青岛市市北区清江路160-54号清研素养中心</p>
          <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0" />
          <p><strong>到访建议：</strong>请提前预约，我们会为您安排校区参观与课程体验。</p>
          <a class="btn btn-ghost" href="/courses" style="margin-top:12px">先看课程介绍</a>
        </aside>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <span>© 2026 清研思维. All Rights Reserved.</span>
      <span>感谢关注清研思维教育官网</span>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
